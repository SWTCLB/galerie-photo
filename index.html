
<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Galerie</title>

<style>

html {
    scroll-behavior:smooth;
    scroll-snap-type:y mandatory;
}

body {
    margin:0;
    background:#0b0b0b;
    color:#ddd;
    font-family:Arial, sans-serif;
}

.gallery {
    display:flex;
    flex-direction:column;
    align-items:center;
}

figure {
    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    scroll-snap-align:center;
}

img {
    width:min(92vw, 1200px);
    max-height:85vh;
    object-fit:contain;
}

figcaption {
    margin-top:1rem;
    opacity:0.5;
    font-size:0.9rem;
}

#sound-button {

    position:fixed;

    bottom:20px;
    right:20px;

    background:rgba(0,0,0,0.6);

    color:#ddd;

    border:1px solid #444;

    padding:10px 14px;

    cursor:pointer;

    font-size:0.85rem;

    border-radius:4px;

    z-index:1000;
}

#license {

    padding:4rem 2rem;

    text-align:center;

    opacity:0.35;

    font-size:0.8rem;
}

#license a {
    color:#999;
    text-decoration:none;
}

#license a:hover {
    color:#ddd;
}

#overlay {
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.95);

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    pointer-events:none;

    transition:opacity 0.2s ease;

    z-index:2000;
}

#overlay.visible {
    opacity:1;
    pointer-events:auto;
}

#overlay img {
    max-width:96vw;
    max-height:96vh;

    object-fit:contain;
}

</style>

</head>

<body>

<audio id="ambience" loop>
    <source src="audio/session.wav"
            type="audio/wav">
</audio>

<button id="sound-button">
    son
</button>

<div id="overlay">
    <img id="overlay-img">
</div>

<script>

/* audio */

const audio =
    document.getElementById("ambience");

const button =
    document.getElementById("sound-button");

button.addEventListener("click", () => {

    if(audio.paused) {

        audio.play();

        button.textContent = "mute";

    } else {

        audio.pause();

        button.textContent = "son";

    }

});

/* plein écran image */

const overlay =
    document.getElementById("overlay");

const overlayImg =
    document.getElementById("overlay-img");

document
.querySelectorAll("figure img")
.forEach(img => {

    img.addEventListener("click", () => {

        overlayImg.src = img.src;

        overlay.classList.add("visible");

    });

});

overlay.addEventListener("click", () => {

    overlay.classList.remove("visible");

});

</script>
