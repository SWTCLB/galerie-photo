<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Galerie</title>

<style>

html {
    scroll-behavior:smooth;
    scroll-snap-type:y mandatory;
}

body {
    margin:0;
    background:#0b0b0b;
    color:#ddd;
    font-family:Arial, sans-serif;
}

.gallery {
    display:flex;
    flex-direction:column;
    align-items:center;
}

figure {
    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    scroll-snap-align:center;
}

img {
    width:min(92vw, 1200px);
    max-height:85vh;
    object-fit:contain;

    box-shadow:
        0 0 50px rgba(0,0,0,0.7);

    border-radius:4px;
}

figcaption {
    margin-top:1rem;
    opacity:0.5;
    font-size:0.9rem;
}

</style>
</head>
