
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Galerie</title>

<style>

html {
    scroll-behavior:smooth;
    scroll-snap-type:y mandatory;
}

body {
    margin:0;
    background:#0b0b0b;
    color:#ddd;
    font-family:Arial, sans-serif;
}

.gallery {
    display:flex;
    flex-direction:column;
    align-items:center;
}

figure {
    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    scroll-snap-align:center;
}

img {
    width:min(92vw, 1200px);
    max-height:85vh;
    object-fit:contain;

    border-radius:4px;
}

figcaption {
    margin-top:1rem;
    opacity:0.5;
    font-size:0.9rem;
}

#sound-button{

    position:fixed;

    bottom:20px;
    right:20px;

    background:rgba(0,0,0,0.6);

    color:#ddd;

    border:1px solid #444;

    padding:10px 14px;

    cursor:pointer;

    border-radius:4px;
}

</style>
</head>

<body>

<audio id="ambience" loop>
    <source src="audio/session.wav"
            type="audio/wav">
</audio>

<button id="sound-button">
    son
</button>

<div class="gallery">

    <figure class="fade">
        <img src="photos/photo1.jpg" alt="photo1">
        <figcaption>22 March 2026</figcaption>
    </figure>
    
    <figure class="fade">
        <img src="photos/ADSCF0066A.jpg" alt="ADSCF0066A">
        <figcaption>06 April 2026</figcaption>
    </figure>
    
    <figure class="fade">
        <img src="photos/photo3.jpg" alt="photo3">
        <figcaption>26 April 2026</figcaption>
    </figure>
    
    <figure class="fade">
        <img src="photos/P1000718a.jpg" alt="P1000718a">
        <figcaption>26 April 2026</figcaption>
    </figure>
    
    <figure class="fade">
        <img src="photos/P1000746a.jpg" alt="P1000746a">
        <figcaption>26 April 2026</figcaption>
    </figure>
    
    <figure class="fade">
        <img src="photos/P1000765a.jpg" alt="P1000765a">
        <figcaption>26 April 2026</figcaption>
    </figure>
    
    <figure class="fade">
        <img src="photos/DSCF0447A.jpg" alt="DSCF0447A">
        <figcaption>09 May 2026</figcaption>
    </figure>
    
    <figure class="fade">
        <img src="photos/photo2.jpg" alt="photo2">
        <figcaption>09 May 2026</figcaption>
    </figure>
    
    <figure class="fade">
        <img src="photos/photo4.jpg" alt="photo4">
        <figcaption>10 May 2026</figcaption>
    </figure>
    
    <figure class="fade">
        <img src="photos/photo5.jpg" alt="photo5">
        <figcaption>10 May 2026</figcaption>
    </figure>
    
    <figure class="fade">
        <img src="photos/photo6.jpg" alt="photo6">
        <figcaption>10 May 2026</figcaption>
    </figure>
    
</div>

<script>

/* JavaScript */

const audio =
    document.getElementById("ambience");

const button =
    document.getElementById("sound-button");

button.addEventListener("click", () => {

    if(audio.paused){

        audio.play();

        button.textContent = "mute";

    } else {

        audio.pause();

        button.textContent = "son";

    }

});

</script>

</body>
</html>
